query Input {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity { amount currencyCode }
        totalAmount { amount currencyCode }
      }
      merchandise {
        ... on ProductVariant {
          id
          product { id title }
        }
      }
    }
    cost {
      totalAmount { amount currencyCode }
    }
    buyerIdentity {
      customer {
        id
        numberOfOrders
        amountSpent { amount currencyCode }
        metafield(namespace: "personalized_coupons", key: "scoring") {
          value
        }
      }
    }
  }
  discountNode {
    metafield(namespace: "$app:config", key: "settings") {
      value
    }
  }
}
